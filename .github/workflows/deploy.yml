name: Deploy to Vercel

# Lint + tests always run. The Vercel deploy steps run only when the deploy
# secrets (VERCEL_TOKEN/ORG/PROJECT) are configured on the repo — otherwise they
# skip cleanly instead of failing. Note: deploys are also done directly from the
# dev machine via `npx vercel deploy --prod`, so this Action is optional CI.
#
# MONOREPO (Phase 0): this is now an npm-workspaces + Turborepo repo. Root
# `npm run lint` / `npm test` proxy through Turbo to the workspaces (apps/web,
# packages/core). The Next.js app lives in apps/web — so the Vercel project's
# **Root Directory must be set to `apps/web`** (Project Settings → General) for
# the vercel build/deploy steps (and `npx vercel deploy`) to find it.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-prod
  cancel-in-progress: true

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Install Vercel CLI
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build (production)
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt output to production
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
