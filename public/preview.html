        .f1row{transition:background .16s ease}

        .wrap{max-width:1200px;margin:0 auto;padding:0 22px 90px;position:relative;z-index:2}

        .h-page{font-size:clamp(34px,6.4vw,50px)}

        @media(max-width:860px){.hero{grid-template-columns:1fr;gap:20px;padding:24px 0 16px}}
        @media(max-width:560px){.wrap{padding:0 14px 72px}}
        ::-webkit-scrollbar{height:7px;width:7px}
        ::-webkit-scrollbar-thumb{background:${t.border};border-radius:4px}
        ::-webkit-scrollbar-track{background:transparent}
      `}</style>

      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:1,
        backgroundImage:NOISE,backgroundSize:"140px 140px",
        opacity:t.scheme==="light"?.025:.05,mixBlendMode:t.scheme==="light"?"multiply":"screen"}}/>

}

/* Expected-goals momentum — cumulative xG lines; spikes mark real chances.
   Interactive: hover for a broadcast-style readout at any minute. */
function XgChart({t,m,H,A}){
  const W=320,Hh=66,maxX=90,maxY=2.6;
  const px=x=>(x/maxX)*W, py=y=>(Hh-4)-(y/maxY)*(Hh-14);
  const line=pts=>pts.map((p,i)=>`${i?"L":"M"}${px(p[0]).toFixed(1)},${py(p[1]).toFixed(1)}`).join(" ");
  const lastH=m.xgHome[m.xgHome.length-1], lastA=m.xgAway[m.xgAway.length-1];
  const area=`${line(m.xgHome)} L${px(lastH[0]).toFixed(1)},${Hh} L0,${Hh} Z`;
  const ns="non-scaling-stroke";
  const interp=(s,mn)=>{for(let i=1;i<s.length;i++){if(s[i][0]>=mn){const[x0,y0]=s[i-1],[x1,y1]=s[i];
    return y0+(y1-y0)*((mn-x0)/((x1-x0)||1));}}return s[s.length-1][1];};
  const [hov,setHov]=useState(null);
  const onMove=(e)=>{const r=e.currentTarget.getBoundingClientRect();
    const fx=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
    setHov(Math.min(m.min,fx*maxX));};
  const hH=hov!=null?interp(m.xgHome,hov):null, hA=hov!=null?interp(m.xgAway,hov):null;
  const hxPct=hov!=null?(hov/maxX)*100:0;
  return (
    <div style={{marginTop:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
        <span style={{fontSize:10.5,color:t.textFaint,fontWeight:700,textTransform:"uppercase",
          letterSpacing:".09em",display:"flex",alignItems:"center",gap:6}}>
          <span style={{width:5,height:5,borderRadius:"50%",background:t.accent,boxShadow:`0 0 6px ${t.accent}`}}/>
          xG Momentum</span>
        <span className="num" style={{fontSize:12.5,fontWeight:700,letterSpacing:".02em"}}>
          <b style={{color:t.accent}}>{(hH??lastH[1]).toFixed(2)}</b>
          <span style={{color:t.textFaint,fontWeight:500}}> – </span>
          <b style={{color:t.text}}>{(hA??lastA[1]).toFixed(2)}</b>
          {hov!=null&&<span className="num" style={{color:t.textFaint,fontWeight:600,marginLeft:7,
            fontSize:11}}>{Math.round(hov)}'</span>}</span>
      </div>
      <div onMouseMove={onMove} onMouseLeave={()=>setHov(null)}
        style={{position:"relative",height:Hh,cursor:"crosshair"}}>
        <svg viewBox={`0 0 ${W} ${Hh}`} width="100%" height={Hh} preserveAspectRatio="none"
          style={{display:"block",overflow:"visible"}}>
          <defs>
            <linearGradient id="xgfill" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={hex(t.accent,.32)}/>
              <stop offset="100%" stopColor={hex(t.accent,0)}/>
            </linearGradient>
          </defs>
          {[0.65,1.3,1.95].map((v,i)=>(<line key={i} x1="0" y1={py(v)} x2={W} y2={py(v)}
            stroke={hex(t.border,.45)} strokeWidth="1" strokeDasharray="1 5" vectorEffect={ns}/>))}
          <line x1="0" y1={Hh-3} x2={W} y2={Hh-3} stroke={hex(t.border,.9)} strokeWidth="1" vectorEffect={ns}/>
          {[15,30,45,60].map(mn=>(<line key={mn} x1={px(mn)} y1={Hh-5} x2={px(mn)} y2={Hh-1}
            stroke={hex(t.textFaint,.6)} strokeWidth="1" vectorEffect={ns}/>))}
          {m.goals.map((g,i)=>(<line key={i} x1={px(g.m)} y1="2" x2={px(g.m)} y2={Hh-3}
            stroke={hex(t.accent,.4)} strokeWidth="1" strokeDasharray="2 3" vectorEffect={ns}/>))}
          <line x1={px(m.min)} y1="0" x2={px(m.min)} y2={Hh-3} stroke={hex(t.live,.55)} strokeWidth="1"
            strokeDasharray="3 3" vectorEffect={ns}/>
          <path d={area} fill="url(#xgfill)"/>
          <path d={line(m.xgAway)} fill="none" stroke={A.c} strokeWidth="1.75" strokeLinejoin="round"
            strokeLinecap="round" vectorEffect={ns}/>
          <path d={line(m.xgHome)} fill="none" stroke={t.accent} strokeWidth="2.4" strokeLinejoin="round"
            strokeLinecap="round" vectorEffect={ns} style={{filter:`drop-shadow(0 1px 4px ${hex(t.accent,.5)})`}}/>
        </svg>
        {/* goal flags */}
        {m.goals.map((g,i)=>(<span key={i} style={{position:"absolute",left:`${(g.m/maxX)*100}%`,
          top:-2,transform:"translateX(-50%)",fontSize:9}}>⚽</span>))}
        {/* live endpoint pulse */}
        <span style={{position:"absolute",left:`${(lastH[0]/maxX)*100}%`,top:py(lastH[1])-4,
          transform:"translateX(-50%)"}}><Pulse color={t.accent} size={8}/></span>
        {/* hover crosshair + readout dot */}
        {hov!=null&&(<>
          <div style={{position:"absolute",left:`${hxPct}%`,top:0,bottom:3,width:1,
            background:hex(t.text,.5),pointerEvents:"none"}}/>
          <div style={{position:"absolute",left:`${hxPct}%`,top:py(hH)-4,width:8,height:8,
            borderRadius:"50%",background:t.accent,border:`2px solid ${t.bg}`,
            transform:"translateX(-50%)",pointerEvents:"none",boxShadow:`0 0 8px ${t.accent}`}}/>
        </>)}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:t.textFaint,
        fontWeight:600,marginTop:2,letterSpacing:".04em"}}>
        <span>0'</span><span>HT</span><span className="num">{m.min}' LIVE</span></div>
      <div style={{fontSize:11,color:t.textDim,marginTop:7,lineHeight:1.5}}>
        Spikes are real chances. Spain's <b style={{color:t.accent}}>{lastH[1].toFixed(2)} xG</b> dwarfs
        Cabo Verde's {lastA[1].toFixed(2)} — the scoreline is earned, not lucky.</div>
    </div>
  );
}

        {m.shots.map((s,i)=>{const col=s.a?A.c:t.accent;const on=hv===i;
          return (<div key={i} onMouseEnter={()=>setHv(i)} onMouseLeave={()=>setHv(null)}
            style={{position:"absolute",left:`${s.x}%`,top:`${s.y}%`,
            transform:`translate(-50%,-50%) scale(${on?1.35:1})`,borderRadius:"50%",
            transition:"transform .15s ease",cursor:"pointer",
            width:s.g?13:9,height:s.g?13:9,background:s.g?col:hex(col,.12),
            border:`2px solid ${col}`,zIndex:on?5:2,
            boxShadow:s.g?`0 0 10px ${col}, 0 0 3px ${col}`:on?`0 0 8px ${col}`:"none"}}/>);})}
        {hv!=null&&(<div style={{position:"absolute",left:`${m.shots[hv].x}%`,
          top:`calc(${m.shots[hv].y}% - 16px)`,transform:"translate(-50%,-100%)",
          background:t.bg,color:t.text,border:`1px solid ${hex(t.border,.9)}`,borderRadius:7,
          padding:"5px 9px",fontSize:10.5,fontWeight:700,whiteSpace:"nowrap",zIndex:9,
          boxShadow:t.shadow,pointerEvents:"none",animation:"lltip .12s ease both"}}>
          <span style={{color:m.shots[hv].g?t.win:t.textDim}}>{m.shots[hv].g?"⚽ Goal":"Shot"}</span>
          <span style={{color:t.textFaint}}> · </span>{m.shots[hv].a?A.n:H.n}</div>)}
      </div>
      <div style={{display:"flex",gap:16,marginTop:8,fontSize:11,color:t.textDim}}>
        <span style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{width:11,height:11,borderRadius:"50%",background:t.accent,
            boxShadow:`0 0 7px ${t.accent}`}}/>Goal</span>
        <span style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{width:9,height:9,borderRadius:"50%",border:`2px solid ${t.accent}`}}/>Spain shot</span>
        <span style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{width:9,height:9,borderRadius:"50%",border:`2px solid ${A.c}`}}/>Cabo Verde shot</span>
      </div>
    </div>
  );
}

function Predict({m,t,bundle}){
  const [h,setH]=useState(1),[a,setA]=useState(0),[locked,setLocked]=useState(false);
  const H=TEAMS[m.home],A=TEAMS[m.away];
  const step=(set,v,d)=>set(Math.max(0,Math.min(9,v+d)));
  return (
    <div style={{padding:"13px 15px",opacity:bundle?1:.5,...card(t,locked?{ring:hex(t.gold,.45)}:{})}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10.5,color:t.textFaint,
        marginBottom:10,textTransform:"uppercase",letterSpacing:".05em",fontWeight:600}}>
        <span>{m.group} · {m.venue}</span><span>{m.time}</span></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><Crest code={m.home} size={28}/>
          <span className="cond" style={{fontSize:14,fontWeight:700}}>{H.n}</span></div>
        {bundle&&!locked?(<div style={{display:"flex",alignItems:"center",gap:7}}>
          <Step t={t} v={h} up={()=>step(setH,h,1)} dn={()=>step(setH,h,-1)}/>
          <span style={{color:t.textFaint}}>:</span>
          <Step t={t} v={a} up={()=>step(setA,a,1)} dn={()=>step(setA,a,-1)}/></div>)
          :(<span className="disp num" style={{fontSize:20,fontWeight:800,
            color:locked?t.gold:t.textFaint}}>{bundle?`${h}:${a}`:"?:?"}</span>)}
        <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"flex-end"}}>
          <span className="cond" style={{fontSize:14,fontWeight:700}}>{A.n}</span>
          <Crest code={m.away} size={28}/></div></div>
      {bundle&&(<button onClick={(e)=>{e.stopPropagation();setLocked(!locked);}} style={{marginTop:11,
        width:"100%",padding:9,borderRadius:8,border:"none",cursor:"pointer",fontSize:12.5,
        fontWeight:800,transform:locked?"none":"skewX(-9deg)",
        background:locked?t.chip:t.accent,color:locked?t.textDim:t.onAccent,display:"flex",
        alignItems:"center",justifyContent:"center",gap:6}}>
        {locked?<><Check size={13}/>Locked — tap to edit</>
          :<span style={unskew}><Lock size={13}/>Lock prediction</span>}</button>)}
    </div>
  );
}
function Step({t,v,up,dn}){
  return (<div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
    <button className="stepbtn" onClick={up} style={sb(t)}><Plus size={12}/></button>
    <span className="disp num" style={{fontSize:20,fontWeight:800,lineHeight:1.1,margin:"1px 0"}}>{v}</span>
    <button className="stepbtn" onClick={dn} style={sb(t)}><Minus size={12}/></button></div>);
}
const sb=t=>({width:24,height:18,borderRadius:5,border:"none",background:t.chip,color:t.text,
  cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0});

/* Paywall — flooded accent so it interrupts, not another grey card */
function Paywall({t}){
  return (<div style={{background:carbon(t.gold),color:INK,borderRadius:12,padding:"14px 16px",
    display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap",
    boxShadow:`inset 0 2px 12px ${hex("#000",.16)}, ${t.shadow}`}}>
    <span style={{fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:7}}>
      <Lock size={14}/>Predicting, friend leagues &amp; goal alerts are part of the $5 bundle.</span>
    <button style={{padding:"8px 18px",border:"none",background:INK,color:t.gold,fontWeight:800,
      fontSize:12.5,cursor:"pointer",whiteSpace:"nowrap",transform:"skewX(-9deg)"}}>
      <span style={unskew}>Unlock $5</span></button></div>);
}

function FriendLeague({t,bundle}){
  return (<div style={{padding:16,marginBottom:14,...card(t)}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span className="cond" style={{fontWeight:700,fontSize:16,display:"flex",alignItems:"center",
        gap:7}}><Users size={16} color={t.accent}/>The Lads ⚽</span>
      {bundle&&<span style={{fontSize:11,color:t.textDim}}>Code <b style={{color:t.text}}>WC7K2P</b></span>}</div>
    {!bundle?(<div style={{marginTop:11}}>
      <p style={{fontSize:12.5,color:t.textDim,lineHeight:1.6,margin:"0 0 12px"}}>
        Join your friends' league and watch the leaderboard free. Predict to climb it — that needs
        the bundle.</p>
      <button style={{width:"100%",padding:10,borderRadius:9,border:"none",background:t.accent,
        color:t.onAccent,fontWeight:800,fontSize:13,cursor:"pointer"}}>Join with a code</button></div>)
      :(<div style={{marginTop:12}}>
        {[...LEAGUE].sort((a,b)=>b.p-a.p).map((m,i)=>(
          <div key={m.n} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",
            borderTop:i?`1px solid ${hex(t.border,.5)}`:"none"}}>
            <span className="num" style={{width:16,fontSize:13,fontWeight:800,
              color:i===0?t.gold:t.textFaint}}>{i+1}</span>
            <div style={{width:26,height:26,borderRadius:"50%",background:m.me?t.accent:t.chip,
              color:m.me?t.onAccent:t.textDim,display:"flex",alignItems:"center",
              justifyContent:"center",fontSize:11,fontWeight:800}}>{m.n[0]}</div>
            <span style={{flex:1,fontSize:13,fontWeight:m.me?700:500,color:m.me?t.accent:t.text}}>
              {m.n}{i===0?<Crown size={12} style={{marginLeft:5,verticalAlign:-1,color:t.gold}}/>:null}</span>
            <span style={{fontSize:10.5,color:t.win}}>+{m.d}</span>
            <span className="num" style={{fontSize:14,fontWeight:800,minWidth:22,
              textAlign:"right"}}>{m.p}</span>
          </div>))}
        <button style={{width:"100%",marginTop:12,padding:9,borderRadius:9,border:"none",
          background:t.chip,color:t.text,fontWeight:700,fontSize:12.5,cursor:"pointer",display:"flex",
          alignItems:"center",justifyContent:"center",gap:6}}><Share2 size={13}/>Share invite link</button>
      </div>)}
  </div>);
}
function Briefing({t,bundle}){
  if(!bundle) return null;
  return (<div style={{padding:16,position:"relative",overflow:"hidden",...card(t)}}>
    <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:t.gold}}/>
    <div className="cond" style={{fontWeight:700,fontSize:15,marginBottom:10,display:"flex",
      alignItems:"center",gap:7}}><Bell size={15} color={t.gold}/>Morning briefing</div>
    <div style={{fontSize:12.5,color:t.textDim,lineHeight:1.65}}>
      <p style={{margin:"0 0 8px"}}><b style={{color:t.text}}>Brazil drew 1–1</b> with Morocco —
      now 2nd in Group G. A win tonight guarantees top two.</p>
      <p style={{margin:"0 0 8px"}}>You scored <b style={{color:t.win}}>+1</b> yesterday.</p>
      <p style={{margin:0}}><b style={{color:t.text}}>Today:</b> Spain (live), Argentina 9:00 PM.</p></div>
  </div>);
}

/* ============================ F1 ============================ */
function F1({t}){
  const [tab,setTab]=useState("drivers");
  return (
    <div className="rise">
      <div style={{padding:"32px 0 18px"}}>
        <Tag color={t.crimson} bg={hex(t.crimson,.16)}>FIA Formula One 2026</Tag>
        <h1 className="disp h-page" style={{fontWeight:800,margin:"14px 0 0"}}>
          2026 Season // Board</h1></div>
      <NextRace t={t}/>
      <div style={{marginTop:26}}>
        <div style={{display:"flex",gap:6,marginBottom:14}}>
          {[["drivers","Drivers"],["ctors","Constructors"]].map(([id,l])=>(
            <button key={id} onClick={()=>setTab(id)} style={{padding:"8px 18px",borderRadius:8,
              border:"none",cursor:"pointer",fontSize:13.5,fontWeight:700,
              background:tab===id?t.crimson:t.chip,color:tab===id?"#fff":t.textDim}}>{l}</button>))}</div>
        {tab==="drivers"?<DriverTable t={t}/>:<CtorTable t={t}/>}</div>
      <div style={{marginTop:28}}><SL t={t}><Calendar size={15}/> Season calendar
        <span style={{fontSize:11,color:t.textFaint,fontWeight:500,fontStyle:"normal",
          textTransform:"none",marginLeft:4}}>· tap a finished race</span></SL>
        <Strip>{F1_RACES.map(r=><RaceNode key={r.r} r={r} t={t}/>)}</Strip></div>
    </div>
  );
}
function NextRace({t}){
  const [now,setNow]=useState(Date.now());
  useEffect(()=>{const id=setInterval(()=>setNow(Date.now()),1000);return()=>clearInterval(id);},[]);
  const target=useMemo(()=>{const d=new Date();d.setDate(d.getDate()+((7-d.getDay())%7||7));
    d.setHours(9,0,0,0);return d.getTime();},[]);
  const diff=Math.max(0,target-now);
  const dd=Math.floor(diff/864e5),hh=Math.floor(diff/36e5)%24,mm=Math.floor(diff/6e4)%60,
    ss=Math.floor(diff/1e3)%60;
  return (<div style={{position:"relative",overflow:"hidden",...card(t,{ring:hex(t.crimson,.38)})}}>
    <div style={{position:"absolute",top:0,left:0,bottom:0,width:5,background:t.crimson}}/>
    {/* glowing wireframe of the circuit — turns "reading a site" into "analysing a race" */}
    <svg viewBox="0 0 200 120" preserveAspectRatio="xMidYMid meet" style={{position:"absolute",
      right:-6,top:"50%",transform:"translateY(-50%)",height:"150%",opacity:.5,pointerEvents:"none"}}>
      <path d={TRACK_AUT} fill="none" stroke={hex(t.crimson,.32)} strokeWidth="5"/>
      <path d={TRACK_AUT} fill="none" stroke={t.crimson} strokeWidth="1.6"
        style={{filter:`drop-shadow(0 0 4px ${hex(t.crimson,.8)})`}}/>
      <circle r="3" fill="#fff" style={{filter:`drop-shadow(0 0 5px ${t.crimson})`}}>
        <animateMotion dur="6s" repeatCount="indefinite" path={TRACK_AUT}/>
      </circle>
    </svg>
    <div style={{position:"relative",padding:"22px 24px",display:"flex",justifyContent:"space-between",
      alignItems:"center",gap:20,flexWrap:"wrap"}}>
      <div><div style={{fontSize:11.5,color:t.textDim,textTransform:"uppercase",letterSpacing:".06em",
        fontWeight:700,marginBottom:6}}>Round 8 · Next Grand Prix</div>
        <div className="disp" style={{fontSize:34,fontWeight:800}}>Austrian GP</div>
        <div style={{fontSize:13,color:t.textDim,display:"flex",alignItems:"center",gap:6,
          marginTop:4}}><MapPin size={13}/>Red Bull Ring, Spielberg · 4.318 km · 71 laps</div></div>
      <div style={{display:"flex",gap:9,flexWrap:"wrap"}}>
        {[[dd,"DAYS"],[hh,"HRS"],[mm,"MIN"],[ss,"SEC"]].map(([v,l])=>(
          <div key={l} style={{textAlign:"center",background:hex(t.bg,.65),borderRadius:10,
            padding:"10px 13px",minWidth:60,backdropFilter:"blur(2px)"}}>
            <div className="num" style={{fontSize:30,fontWeight:900,color:t.crimson,
              letterSpacing:".02em"}}>{String(v).padStart(2,"0")}</div>
            <div style={{fontSize:9.5,color:t.textFaint,letterSpacing:".12em",fontWeight:700}}>{l}</div></div>))}</div>
    </div></div>);
}
function DriverTable({t}){
  const [open,setOpen]=useState(null);const max=F1_DRIVERS[0].pts;
  const maxGap=F1_DRIVERS[F1_DRIVERS.length-1].gap||1;
  return (<div style={{overflow:"hidden",...card(t)}}>
    {/* timing-tower header */}
    <div style={{display:"flex",alignItems:"center",height:26,padding:"0 14px 0 0",
      background:hex(t.bg,t.scheme==="light"?.4:.5),borderBottom:`1px solid ${hex(t.border,.6)}`,
      fontSize:8.5,fontWeight:800,letterSpacing:".12em",color:t.textFaint,textTransform:"uppercase"}}>
      <span style={{width:5}}/><span style={{width:38,textAlign:"center"}}>POS</span>
      <span style={{width:62,marginLeft:0}}>DRIVER</span>
      <span style={{flex:1}}>SECTORS</span>
      <span style={{marginRight:25}}>PTS · INT</span></div>
    {F1_DRIVERS.map((d,i)=>{const open_=open===d.code;return (<div key={d.code} style={{position:"relative"}}>
      <div className="f1row" onClick={()=>setOpen(open_?null:d.code)} style={{display:"flex",alignItems:"center",
        height:48,paddingRight:14,borderTop:i?`1px solid ${hex(t.border,.55)}`:"none",cursor:"pointer",
        position:"relative",overflow:"hidden",
        background:open_?t.surfaceHi:"transparent"}}>
        {/* leader gets a sweeping broadcast light */}
        {i===0&&<div style={{position:"absolute",inset:0,pointerEvents:"none",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,bottom:0,width:"22%",
            background:`linear-gradient(90deg, transparent, ${hex(t.gold,.14)}, transparent)`,
            animation:"llsweep 4.5s ease-in-out infinite"}}/></div>}
        {/* unbroken constructor colour line, edge to edge */}
        <div style={{width:5,height:"100%",background:d.tc,flexShrink:0,
          boxShadow:`0 0 8px ${hex(d.tc,.6)}`}}/>
        <span className="num" style={{width:38,textAlign:"center",fontSize:15,fontWeight:900,
          color:i===0?t.gold:t.text}}>{d.p}</span>
        {/* skewed acronym block — the Rolex timing-tower cue */}
        <div style={{width:46,height:28,background:i===0?t.gold:t.text,color:t.bg,fontWeight:900,fontSize:15,
          display:"flex",alignItems:"center",justifyContent:"center",transform:"skewX(-13deg)",
          margin:"0 12px 0 4px",flexShrink:0,boxShadow:i===0?`0 0 12px ${hex(t.gold,.5)}`:"none"}}>
          <span className="num" style={{transform:"skewX(13deg)",letterSpacing:".02em"}}>{d.code}</span></div>
        <div style={{flex:1,minWidth:0,display:"flex",alignItems:"center",gap:9}}>
          <span style={{flex:"1 1 auto",minWidth:0,fontSize:13.5,fontWeight:700,textTransform:"uppercase",letterSpacing:".02em",
            whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.n}</span>
          {/* sector micro-blocks in F1's sacred purple/green/yellow */}
          <span style={{display:"flex",gap:2,flexShrink:0}}>
            {DSEC[d.code].map((s,j)=><span key={j} style={{width:11,height:5,borderRadius:1,
              background:SECTOR[s],boxShadow:s==="p"?`0 0 5px ${hex(SECTOR.p,.7)}`:"none"}}/>)}</span>
        </div>
        <div style={{textAlign:"right",marginLeft:8,minWidth:62}}>
          <span className="num" style={{fontSize:19,fontWeight:900,letterSpacing:".01em"}}>{d.pts}</span>
          <div className="num" style={{fontSize:9.5,color:d.gap?t.textFaint:t.gold,fontWeight:800,
            letterSpacing:".04em"}}>{d.gap?`+${d.gap}`:"LEADER"}</div></div>
        <ChevronDown size={15} color={t.textFaint} style={{marginLeft:10,
          transform:open_?"rotate(180deg)":"none",transition:"transform .2s"}}/>
        {/* points-share telemetry underline */}
        <div style={{position:"absolute",left:0,bottom:0,height:2,width:`${(d.pts/max)*100}%`,
          background:`linear-gradient(90deg, ${hex(d.tc,.2)}, ${d.tc})`}}/>
      </div>
      {open_&&(<div className="rise" style={{padding:"12px 16px 15px 60px",
        background:t.surfaceHi,borderTop:`1px solid ${hex(t.border,.4)}`}}>
        <div style={{display:"flex",gap:18,marginBottom:11,flexWrap:"wrap"}}>
          {[["WINS",d.wins],["POINTS",d.pts],["GAP",d.gap?`+${d.gap}`:"—"],["TEAM",d.team]].map(([l,v])=>(
            <div key={l}><div className="num cond" style={{fontSize:17,fontWeight:800}}>{v}</div>
              <div style={{fontSize:9,color:t.textFaint,fontWeight:700,letterSpacing:".08em"}}>{l}</div></div>))}
        </div>
        {/* gap-to-leader interval bar */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
          <span style={{fontSize:9,color:t.textFaint,fontWeight:700,letterSpacing:".06em",width:46}}>INTERVAL</span>
          <div style={{flex:1,height:6,background:t.chip,overflow:"hidden",borderRadius:3,position:"relative"}}>
            <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${(1-d.gap/maxGap)*100}%`,
              background:d.tc,borderRadius:3}}/></div>
        </div>
        <div style={{fontSize:12,color:t.textDim,lineHeight:1.6}}>{d.gap===0
          ?"Championship leader — only needs to finish ahead of Russell in Austria to extend the lead."
          :`Trails by ${d.gap} pts. Must average ${(d.gap/15).toFixed(1)} more pts per round than the leader across the final 15 races.`}</div></div>)}
    </div>);})}</div>);
}
function CtorTable({t}){const max=F1_CTORS[0].pts;
  return (<div style={{display:"grid",gap:10}}>{F1_CTORS.map((c,i)=>(
    <div key={c.n} style={{padding:"14px 16px",...card(t)}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:9}}>
        <span className="disp num" style={{fontSize:18,fontWeight:800,
          color:i===0?t.gold:t.textFaint}}>{c.p}</span>
        <div style={{width:4,height:22,background:c.c,borderRadius:2}}/>
        <span className="cond" style={{flex:1,fontSize:16,fontWeight:700}}>{c.n}</span>
        <span style={{fontSize:12,color:t.textDim}}>{c.wins} wins</span>
        <span className="disp num" style={{fontSize:21,fontWeight:800}}>{c.pts}</span></div>
      <div style={{height:6,background:t.chip,overflow:"hidden",borderRadius:3}}>
        <div style={{width:`${(c.pts/max)*100}%`,height:"100%",background:c.c}}/></div></div>))}</div>);
}
function RaceNode({r,t}){
  const [open,setOpen]=useState(false);
  return (<div onClick={()=>r.done&&setOpen(!open)} className="lift" style={{minWidth:open?226:144,
    cursor:r.done?"pointer":"default",padding:13,transition:"min-width .2s",
    ...card(t,r.next?{ring:hex(t.crimson,.5)}:{})}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <span style={{fontSize:11,color:t.textFaint,fontWeight:700}}>R{r.r}{r.spr?" · SPR":""}</span>
      {r.next?<Tag sk color="#fff" bg={t.crimson}><Pulse color="#fff" size={5}/>Next</Tag>
        :r.done?<Check size={14} color={t.win}/>:<Circle size={11} color={t.textFaint}/>}</div>
    <div className="disp" style={{fontSize:17,fontWeight:800,lineHeight:1}}>{r.n}</div>
    <div style={{fontSize:11,color:t.textDim,marginTop:3}}>{r.loc}</div>
    {open&&r.pod&&(<div className="rise" style={{marginTop:11,borderTop:`1px solid ${hex(t.border,.5)}`,
      paddingTop:10}}>{r.pod.map((code,i)=>(
      <div key={code} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
        <span className="num" style={{fontSize:11,fontWeight:800,width:16,
          color:i===0?t.gold:i===1?"#C0C0C0":"#CD7F32"}}>P{i+1}</span>
        <div style={{width:3,height:14,background:DTEAM[code],borderRadius:2}}/>
        <span className="cond" style={{fontSize:13,fontWeight:i===0?700:500}}>{DNAME[code]}</span></div>))}</div>)}
  </div>);
}

/* ============================ SHARED ============================ */
function SL({t,children}){
  return (<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
    <span style={{width:4,height:18,background:t.accent,transform:"skewX(-10deg)",borderRadius:1}}/>
    <span className="disp" style={{fontSize:19,fontWeight:800,display:"flex",alignItems:"center",
      gap:7}}>{children}</span></div>);
}
function Strip({children}){
  return <div style={{display:"flex",gap:11,overflowX:"auto",paddingBottom:8,marginBottom:30}}>{children}</div>;
}
function Footer({t}){
  return (<div style={{borderTop:`1px solid ${hex(t.border,.6)}`,padding:"22px",textAlign:"center",
    fontSize:11.5,color:t.textFaint}}>Prototype · placeholder data · live feeds (Jolpica F1,
    TheSportsDB, ESPN) wire in during the real build.</div>);
}

window.App = App;

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
